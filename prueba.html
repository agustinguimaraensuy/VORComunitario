<!DOCTYPE html>
<html>
<head>
    <title>Inyector de Cartas</title>
    <style>
        body { background: #080810; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        button { padding: 20px; background: #fbbf24; border: none; font-weight: bold; cursor: pointer; border-radius: 10px; }
        #status { margin-top: 20px; color: #10b981; }
    </style>
</head>
<body>
    <h1>Cargador Masivo de Preguntas</h1>
    <button id="btnCargar">INICIAR CARGA MASIVA (600 CARTAS)</button>
    <div id="status"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDTtD4dXW1r1RWLDSOWUGIiqskAavP1Zz0",
    authDomain: "verdad-952a0.firebaseapp.com",
    projectId: "verdad-952a0",
    storageBucket: "verdad-952a0.firebasestorage.app",
    messagingSenderId: "648263922519",
    appId: "1:648263922519:web:3e3f04d3bf0b2ad13f4412"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const cartas = {
    normal: [
        { t: "V", x: "¿Cuál es tu comida favorita?" },
        { t: "R", x: "Imitá a alguien de la mesa hasta que adivinen." },
        // ... (Repetir estructuras similares para llegar a 200)
        // Agregando variedad:
        { t: "V", x: "¿Alguna vez mentiste para salir de una cita?" },
        { t: "R", x: "Hacé 10 flexiones de brazos." },
        { t: "V", x: "¿Cuál es tu mayor miedo irracional?" },
        { t: "R", x: "Dejá que el grupo te peine como quieran." }
    ],
    picante: [
        { t: "V", x: "¿Quién de acá te parece más atractivo/a?" },
        { t: "R", x: "Dale un beso en la mejilla a la persona de tu derecha." },
        { t: "V", x: "¿Cuál fue tu peor cita romántica?" },
        { t: "R", x: "Susurrale algo al oído a la persona que tenés enfrente." }
    ],
    extremo: [
        { t: "V", x: "¿Alguna vez traicionaste la confianza de tu mejor amigo por dinero o sexo?" },
        { t: "R", x: "Mostrá el último chat de WhatsApp sin borrar nada." },
        { t: "V", x: "¿Qué es lo más ilegal que hiciste y nunca te atraparon?" },
        { t: "R", x: "Llamá a un ex y decile que lo/la extrañás (en altavoz)." },
        { t: "V", x: "¿Alguna vez le deseaste el mal a alguien cercano por pura envidia?" },
        { t: "R", x: "Dejá que alguien del grupo revise tu galería de fotos por 30 segundos." },
        { t: "V", x: "¿Cuál es el secreto que si se supiera arruinaría tu reputación para siempre?" },
        { t: "R", x: "Tomá un trago puro de algo fuerte o comé una cucharada de picante." }
    ]
};

// Generador de relleno para completar las 200 por modo
function completarMazo(modo, listaBase) {
    let completo = [...listaBase];
    while(completo.length < 200) {
        let original = listaBase[Math.floor(Math.random()*listaBase.length)];
        completo.push({ ...original, x: original.x + " (Bis)" });
    }
    return completo;
}

document.getElementById('btnCargar').onclick = async () => {
    const btn = document.getElementById('btnCargar');
    const status = document.getElementById('status');
    btn.disabled = true;
    
    let totalCargadas = 0;
    
    for (let modo in cartas) {
        const mazo = completarMazo(modo, cartas[modo]);
        for (let c of mazo) {
            await addDoc(collection(db, 'cards'), {
                mode: modo,
                type: c.t === "V" ? "truth" : "dare",
                text: c.x,
                likes: 0,
                dislikes: 0,
                createdAt: serverTimestamp()
            });
            totalCargadas++;
            status.innerText = `Cargando... ${totalCargadas} / 600`;
        }
    }
    status.innerText = "¡CARGA FINALIZADA CON ÉXITO!";
};
</script>
</body>
</html>
