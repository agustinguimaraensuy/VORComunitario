<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>EL IMPOSTOR - SALTO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root { --bg:#05050a; --surface:#0f0a14; --border:#2d1b3d; --primary:#3b82f6; --impostor:#ef4444; --success:#10b981; --text:#fce7f3; --muted:#6b7280; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;background-image: radial-gradient(circle at 50% -20%, #1e3a8a 0%, transparent 50%);}
  .wrap{max-width:500px;margin:0 auto;padding:20px;}
  header{text-align:center;padding:30px 0 10px;}
  .logo{font-family:'Bebas Neue';font-size:60px;color:var(--primary);text-shadow: 0 0 20px rgba(59,130,246,0.5);}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:30px;margin-top:20px;text-align:center;}
  input{width:100%;padding:18px;background:#000;border:1px solid var(--border);border-radius:14px;color:#fff;margin:12px 0;text-align:center;font-size:18px;}
  .btn{width:100%;padding:18px;border:none;border-radius:14px;font-family:'Bebas Neue';font-size:22px;cursor:pointer;margin-top:12px;transition:0.2s;}
  .btn-primary{background:var(--primary);color:white;}
  .btn-outline{background:transparent;border:2px solid var(--primary);color:var(--primary);}
  .btn-start{background:var(--impostor);color:white;margin-top:25px;}
  
  .cat-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding:0 5px; }
  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
  
  /* ESTILOS DE CATEGORÍAS ACTUALIZADOS */
  .cat-item { 
    padding: 12px; 
    border-radius: 12px; 
    font-size: 13px; 
    cursor: pointer; 
    transition: 0.3s; 
    border: 2px solid transparent;
    background: var(--impostor); 
    color: rgba(255,255,255,0.8);
    text-decoration: line-through; /* Tachado por defecto */
    font-weight: normal; /* Sin negrita */
  }
  .cat-item.active { 
    background: var(--success); 
    color: white;
    text-decoration: none; /* Quita el tachado al estar activa */
    box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
  }
  .cat-item.disabled { opacity: 0.8; cursor: default; }

  .player-list{margin-top:20px;text-align:left; background:rgba(0,0,0,0.3); border-radius:15px; padding:10px;}
  .player-item{padding:10px; border-bottom:1px solid rgba(255,255,255,0.05); display:flex; justify-content:space-between; font-size: 14px;}
  
  #gameScreen, #lobbyScreen{display:none;}
  .secret-box{font-size:35px; font-family:'Bebas Neue'; color:var(--primary); margin:20px 0; padding:25px; border:2px dashed var(--border); border-radius:15px;}
  .impostor-text{color:var(--impostor); animation: pulse 1s infinite;}
  @keyframes pulse { 0%, 100% { transform:scale(1); } 50% { transform:scale(1.05); } }
</style>
</head>
<body>

<div class="wrap">
  <header><div class="logo">EL IMPOSTOR</div></header>

  <div id="setupScreen">
    <div class="card">
      <input type="text" id="playerName" placeholder="Tu Apodo">
      <button class="btn btn-primary" onclick="createRoom()">CREAR SALA NUEVA</button>
      <input type="number" id="roomCodeInput" placeholder="Código de 4 dígitos">
      <button class="btn btn-outline" onclick="joinRoom()">ENTRAR A LA SALA</button>
    </div>
  </div>

  <div id="lobbyScreen">
    <div class="card">
      <p style="color:var(--muted); font-size:11px;">CÓDIGO DE SALA:</p>
      <h2 id="displayCode" style="font-size:45px; font-family:'Bebas Neue';">----</h2>
      
      <div style="margin-top:15px;">
        <div class="cat-header">
            <p style="font-size:12px; color:var(--primary); font-weight: bold;">CATEGORÍAS:</p>
            <button id="btnAll" onclick="selectAllCats()" style="background:var(--primary); border:none; color:white; padding:5px 10px; border-radius:6px; font-size:10px; cursor:pointer;">ACTIVAR TODAS</button>
        </div>
        <div class="cat-grid" id="catGrid">
          <div class="cat-item active" data-id="deportes" onclick="toggleCat('deportes')">Deportes</div>
          <div class="cat-item active" data-id="musica" onclick="toggleCat('musica')">Música</div>
          <div class="cat-item active" data-id="cine" onclick="toggleCat('cine')">Cine</div>
          <div class="cat-item active" data-id="ficcion" onclick="toggleCat('ficcion')">Ficción</div>
          <div class="cat-item active" data-id="animacion" onclick="toggleCat('animacion')">Animación</div>
          <div class="cat-item active" data-id="redes" onclick="toggleCat('redes')">Redes/Streamers</div>
          <div class="cat-item active" data-id="historia_politica" onclick="toggleCat('historia_politica')">Historia</div>
          <div class="cat-item active" data-id="variados" onclick="toggleCat('variados')">Variados</div>
        </div>
      </div>

      <div class="player-list" id="playerList"></div>
      <div id="hostControls" style="display:none;"><button class="btn btn-start" onclick="startGame()">INICIAR PARTIDA</button></div>
      <div id="waitMsg" style="margin-top:15px; color:var(--muted); font-size:13px;">Esperando que el Host inicie...</div>
    </div>
  </div>

  <div id="gameScreen">
    <div class="card">
        <p style="font-size:12px; color:var(--muted);">TU PERSONAJE:</p>
        <div id="secretRole" class="secret-box">...</div>
        <div id="gameInstruction" style="font-size:14px; color:var(--text); margin-bottom:15px;"></div>
        
        <div id="replayControl" style="display:none;">
            <button class="btn btn-primary" onclick="backToLobby()">CAMBIAR REGLAS</button>
            <button class="btn btn-outline" style="margin-top:10px;" onclick="startGame()">OTRA RONDA</button>
        </div>

        <button class="btn" onclick="location.reload()" style="background:none; color:var(--muted); font-size:13px;">SALIR AL MENÚ</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, updateDoc, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBgXAxWOmLok8XkReoJouYAQRcLZP_yrHg",
  authDomain: "impostor-4f464.firebaseapp.com",
  projectId: "impostor-4f464",
  storageBucket: "impostor-4f464.firebasestorage.app",
  messagingSenderId: "711021445541",
  appId: "1:711021445541:web:7c819e87f6e413bfa2e84c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let currentRoomId = null, myName = "", isHost = false, selectedCats = ["deportes", "musica", "cine", "ficcion", "animacion", "redes", "historia_politica", "variados"];

window.createRoom = async () => {
    myName = document.getElementById('playerName').value.trim();
    if(!myName) return alert("Poné tu nombre");
    currentRoomId = Math.floor(1000 + Math.random() * 9000).toString();
    isHost = true;
    await setDoc(doc(db, "rooms", currentRoomId), { status: "waiting", players: [myName], host: myName, categories: selectedCats, impostores: [] });
    showLobby();
};

window.joinRoom = async () => {
    myName = document.getElementById('playerName').value.trim();
    currentRoomId = document.getElementById('roomCodeInput').value.toString().trim();
    if(!myName || !currentRoomId) return alert("Faltan datos");
    const roomRef = doc(db, "rooms", currentRoomId);
    const snap = await getDoc(roomRef);
    if(snap.exists()) { await updateDoc(roomRef, { players: arrayUnion(myName) }); isHost = false; showLobby(); }
    else alert("La sala no existe");
};

window.toggleCat = async (catId) => {
    if(!isHost) return;
    let nuevas = [...selectedCats];
    if(nuevas.includes(catId)) {
        if(nuevas.length > 1) nuevas = nuevas.filter(c => c !== catId);
    } else {
        nuevas.push(catId);
    }
    selectedCats = nuevas;
    await updateDoc(doc(db, "rooms", currentRoomId), { categories: selectedCats });
};

window.selectAllCats = async () => {
    if(!isHost) return;
    selectedCats = ["deportes", "musica", "cine", "ficcion", "animacion", "redes", "historia_politica", "variados"];
    await updateDoc(doc(db, "rooms", currentRoomId), { categories: selectedCats });
};

function showLobby() {
    document.getElementById('setupScreen').style.display = 'none';
    document.getElementById('lobbyScreen').style.display = 'block';
    document.getElementById('displayCode').innerText = currentRoomId;
    
    onSnapshot(doc(db, "rooms", currentRoomId), (snap) => {
        const data = snap.data();
        if(!data) return;
        selectedCats = data.categories || [];
        
        document.querySelectorAll('.cat-item').forEach(el => {
            el.classList.toggle('active', selectedCats.includes(el.dataset.id));
            if(!isHost) el.classList.add('disabled');
        });
        
        if(!isHost) document.getElementById('btnAll').style.display = 'none';

        document.getElementById('playerList').innerHTML = data.players.map(p => `
            <div class="player-item"><span>${p}</span><span>${p === data.host ? '👑' : ''}</span></div>
        `).join('');

        if(isHost) {
            document.getElementById('hostControls').style.display = 'block';
            document.getElementById('waitMsg').style.display = 'none';
        }

        if(data.status === "playing") renderGame(data);
        else if(data.status === "waiting") {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('lobbyScreen').style.display = 'block';
        }
    });
}

window.backToLobby = async () => {
    await updateDoc(doc(db, "rooms", currentRoomId), { status: "waiting" });
};

window.startGame = async () => {
    const roomRef = doc(db, "rooms", currentRoomId);
    const snap = await getDoc(roomRef);
    const players = snap.data().players;
    if(players.length < 3) return alert("Mínimo 3 jugadores");

    const configSnap = await getDoc(doc(db, "config", "personajesV2"));
    const configData = configSnap.data();
    let pool = [];
    selectedCats.forEach(c => { if(configData[c]) pool = pool.concat(configData[c]); });

    const character = pool[Math.floor(Math.random() * pool.length)];
    let imps = [];
    const r = Math.random() * 100;

    if (r < 2) imps = []; 
    else if (r < 4) imps = [...players]; 
    else if (r < 9) imps = [...players].sort(() => 0.5 - Math.random()).slice(0, 2); 
    else imps = [players[Math.floor(Math.random() * players.length)]]; 

    await updateDoc(roomRef, { status: "playing", character: character, impostores: imps });
};

function renderGame(data) {
    document.getElementById('lobbyScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';
    const roleDiv = document.getElementById('secretRole');
    const instruction = document.getElementById('gameInstruction');
    document.getElementById('replayControl').style.display = isHost ? 'block' : 'none';

    if(data.impostores.includes(myName)) {
        roleDiv.innerText = "¡IMPOSTOR!";
        roleDiv.className = 'secret-box impostor-text';
        instruction.innerHTML = "No sabés quién es el famoso.<br>¡Mentí para que no te descubran!";
    } else {
        roleDiv.innerText = data.character;
        roleDiv.className = 'secret-box';
        instruction.innerHTML = "El famoso es <b>" + data.character + "</b>.<br>Buscá quién está fingiendo.";
    }
}
</script>
</body>
</html>
