<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CUERPOS EN JUEGO - PREMIUM</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#05050a; --surface:#0f0a14; --border:#2d1b3d;
    --level1:#10b981; --level2:#fbbf24; --level3:#d926a9;
    --text:#fce7f3; --muted:#8b5cf6;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;
    background-image: radial-gradient(circle at 50% -20%, #311b92 0%, transparent 50%);}
  .wrap{max-width:720px;margin:0 auto;padding:0 15px 20px;}
  
  header{text-align:center;padding:30px 0 10px; position: relative;}
  .back-to-index{position:absolute; top:10px; left:0; background:none; border:none; color:var(--muted); cursor:pointer; font-family:'Bebas Neue'; font-size:18px;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:50px;line-height:1;background:linear-gradient(to bottom, #fff, var(--level3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}

  /* Selector de Niveles */
  #levelSelector{margin-top:20px;}
  .levels-grid{display:grid; grid-template-columns: 1fr; gap:12px;}
  .lvl-btn{padding:22px; border-radius:16px; border:1px solid rgba(255,255,255,0.1); cursor:pointer; font-family:'Bebas Neue'; font-size:24px; color:white; display:flex; justify-content:space-between; align-items:center;}
  .btn-s{background:rgba(16,185,129,0.1); color:var(--level1); border-color:var(--level1);}
  .btn-t{background:rgba(251,191,36,0.1); color:var(--level2); border-color:var(--level2);}
  .btn-c{background:rgba(217,38,169,0.1); color:var(--level3); border-color:var(--level3);}

  /* Juego Activo */
  #gameZone{display:none; margin-top:10px;}
  .change-lvl{background:none; border:none; color:var(--muted); font-family:'Bebas Neue'; cursor:pointer; margin-bottom:15px; font-size:14px; letter-spacing:1px;}
  
  .card{width:100%;padding:40px;border-radius:24px;border:2px solid var(--border);
    background:var(--surface); display:flex;flex-direction:column;justify-content:center;
    box-shadow: 0 0 40px rgba(0,0,0,0.5); min-height:250px;}
  .card-text{font-size:24px; line-height:1.4; font-weight:500; text-align: center;}
  
  .vote-box { display: flex; gap: 15px; margin-top: 30px; }
  .vote-btn { border: 2px solid var(--border); background:none; color:var(--text); padding: 15px; border-radius: 15px; flex: 1; font-size: 24px; cursor:pointer;}
  .vote-btn:active{background:rgba(255,255,255,0.1);}

  /* Agregar Cartas */
  .add-section{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px; margin-top: 40px; display:none;}
  textarea{width:100%;padding:15px;background:#000;border:1px solid var(--border);border-radius:12px;color:#fff;margin:15px 0;height:80px; font-family: inherit; resize:none;}
  .captcha-row { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-size: 14px; }
  #captchaInput { width: 70px; padding: 10px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 8px; }
  .submit-btn{width:100%;padding:15px;border:none;border-radius:12px;background:var(--level3);color:white;font-family:'Bebas Neue';font-size:20px;cursor:pointer;}

  #loader{ position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;}
</style>
</head>
<body>

<div id="loader">
    <div style="width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--level3);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
    <p id="loadStatus" style="margin-top:20px; font-family:'Bebas Neue'; letter-spacing:2px; color:var(--level3)">SINCRONIZANDO...</p>
</div>

<div class="wrap">
  <header>
    <button class="back-to-index" onclick="location.href='index.html'">← VOLVER</button>
    <div class="logo">CUERPOS<br>EN JUEGO</div>
  </header>

  <div id="levelSelector">
    <p style="text-align:center; color:var(--muted); margin-bottom:20px; font-size:14px; letter-spacing:2px;">ELEGÍ LA INTENSIDAD</p>
    <div class="levels-grid">
      <button class="lvl-btn btn-s" onclick="startLevel('suave')">SUAVE <span>🍃</span></button>
      <button class="lvl-btn btn-t" onclick="startLevel('tension')">TENSIÓN <span>🔥</span></button>
      <button class="lvl-btn btn-c" onclick="startLevel('cuerpos')">CUERPOS <span>🔞</span></button>
    </div>
  </div>

  <div id="gameZone">
    <button class="change-lvl" onclick="resetGame()">← CAMBIAR NIVEL</button>
    <div id="cardDisplay">
      </div>
  </div>

  <div class="add-section" id="addSection">
    <p style="font-family:'Bebas Neue'; color:var(--level3); letter-spacing:1px;">APORTAR AL NIVEL ACTUAL</p>
    <textarea id="cardText" placeholder="Tu propuesta aquí..."></textarea>
    <div class="captcha-row">
        <span id="captchaText"></span>
        <input type="number" id="captchaInput">
    </div>
    <button class="submit-btn" onclick="submitCard()">SUBIR AL MAZO</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, doc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDTtD4dXW1r1RWLDSOWUGIiqskAavP1Zz0",
    authDomain: "verdad-952a0.firebaseapp.com",
    projectId: "verdad-952a0",
    storageBucket: "verdad-952a0.firebasestorage.app",
    messagingSenderId: "648263922519",
    appId: "1:648263922519:web:3e3f04d3bf0b2ad13f4412"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let mazoLocal = [];
let currentLevel = null;
let playsCount = parseInt(localStorage.getItem('cuerpos_v3_plays') || '0');
let captchaValue = 0;

            "Susúrrame al oído cuál es tu prenda de ropa favorita.", "Beso en la mejilla muy lento.",
            "¿Prefieres luz encendida o apagada?", "¿Cuál es tu comida afrodisíaca favorita?",
            "Un abrazo que dure 30 segundos sin hablar.", "Confiesa un capricho que tengas hoy.",
            "¿Qué perfume te vuelve loco/a?", "¿Cuál es tu posición favorita para dormir?",
            "Mirada fija a los ojos por 1 minuto sin reírse.", "Beso en la mano como un caballero/dama.",
            "¿Cuál es el piropo más raro que te dijeron?", "Dibuja un corazón en mi palma con tu dedo.",
            "¿Cuál es tu lugar favorito para una cita?", "Dime algo que te dé mucha vergüenza confesar.",

            "Beso en el cuello que dure 15 segundos.", "Quítate una prenda de ropa ahora mismo.",

            "¿Alguna vez te grabaste en la intimidad?", "Muestra tu última foto de la galería.",
            "Beso de película con la persona a tu izquierda.", "Deja que alguien te quite una prenda.",
            "Bebe algo del ombligo de otra persona.", "Susúrrame una fantasía que quieras cumplir hoy.",
            "Masaje de hombros por debajo de la remera.", "Dime qué tipo de lencería/ropa interior prefieres.",
            "Pasa tu lengua por mi cuello sin besar.", "Siéntate en el regazo de alguien por 2 rondas.",
            "¿Cuál es el lugar más público donde lo hiciste?", "¿Alguna vez tuviste un sueño hot conmigo?",
            "Muestra tu historial de búsqueda de hoy.", "Beso en la clavícula.",

        ],
        cuerpos: [
            "Beso francés intenso de 30 segundos.", "Quita una prenda con los dientes.", 
            "Masaje en la espalda sin remera.", "Reto: 3 minutos en el paraíso (en otra habitación).",
            "¿Cuál es tu fetiche más extraño?", "¿Alguna vez hiciste un trío o lo harías?",
            "Simula un orgasmo con sonidos ahora.", "Deja que alguien te de un beso donde quiera.",
            "Muestra tu juguete favorito o describe uno.", "Quítate la remera hasta el final del juego.",
            "Llamada hot a un ex o contacto (en altavoz).", "Besa a la persona que más te atraiga en la boca.",
            "Dibuja algo con hielo en mi piel.", "Deja que alguien te explore debajo de la ropa por 10 seg.",
            "¿Cuál es la práctica más extrema que probaste?", "Intercambia una prenda con la persona de al lado.",
            "Beso en el abdomen.", "Reto: Body shot (beber de la piel de otro).",
            "Confiesa con quién de aquí tendrías algo ahora mismo.", "Quédate en ropa interior el resto de la partida."
        ]
    };

    let totalCargadas = 0;
    for(let lvl in mazoCompleto) {
        const lista = mazoCompleto[lvl];
        for(let i=0; i<100; i++) {
            // Elige una frase de la lista y le agrega un toque único
            const fraseBase = lista[i % lista.length];
            await addDoc(collection(db, 'cuerpos_cards'), {
                lvl: lvl,
                text: fraseBase + (i >= lista.length ? ` (Ronda ${Math.floor(i/lista.length) + 1})` : ""),
                likes: 0,
                createdAt: serverTimestamp()
            });
            totalCargadas++;
            document.getElementById('loadStatus').innerText = `INYECTANDO MAZO: ${totalCargadas}/300`;
        }
    }
    
    localStorage.setItem('cuerpos_v3_ready', 'true');
    location.reload();
}

        for(let i=1; i<=100; i++) {
            await addDoc(collection(db, 'cuerpos_cards'), {
                lvl: lvl,
                text: basePrompts[lvl][i % basePrompts[lvl].length] + " (Var. " + i + ")",
                likes: 0,
                createdAt: serverTimestamp()
            });
        }
    }
    localStorage.setItem('cuerpos_v3_ready', 'true');
    location.reload();
}

async function loadData() {
    const snap = await getDocs(collection(db, 'cuerpos_cards'));
    mazoLocal = snap.docs.map(d => ({id: d.id, ...d.data()}));
    updateAddSection();
}

window.startLevel = (lvl) => {
    currentLevel = lvl;
    document.getElementById('levelSelector').style.display = 'none';
    document.getElementById('gameZone').style.display = 'block';
    nextCard();
    genCaptcha();
};

window.resetGame = () => {
    document.getElementById('levelSelector').style.display = 'block';
    document.getElementById('gameZone').style.display = 'none';
    document.getElementById('addSection').style.display = 'none';
};

window.nextCard = () => {
    const pool = mazoLocal.filter(c => c.lvl === currentLevel);
    if(pool.length === 0) return alert("Cargando datos...");
    
    const card = pool[Math.floor(Math.random() * pool.length)];
    const color = currentLevel === 'suave' ? 'var(--level1)' : currentLevel === 'tension' ? 'var(--level2)' : 'var(--level3)';
    
    document.getElementById('cardDisplay').innerHTML = `
        <div class="card" style="border-color:${color}">
            <div class="card-text">${card.text}</div>
            <div class="vote-box">
                <button class="vote-btn" onclick="handleVote('${card.id}', false)">👎</button>
                <button class="vote-btn" onclick="handleVote('${card.id}', true)">👍</button>
            </div>
        </div>
    `;
};

window.handleVote = async (id, isLike) => {
    // Voto silencioso
    updateDoc(doc(db, 'cuerpos_cards', id), { likes: increment(isLike ? 1 : -1) });
    
    // Incrementar contador de jugadas
    playsCount++;
    localStorage.setItem('cuerpos_v3_plays', playsCount);
    updateAddSection();

    // Pasar a la siguiente automáticamente
    nextCard();
};

function updateAddSection() {
    if(playsCount >= 10) {
        document.getElementById('addSection').style.display = 'block';
    }
}

function genCaptcha() {
    const a = Math.floor(Math.random()*9)+1, b = Math.floor(Math.random()*9)+1;
    captchaValue = a + b;
    document.getElementById('captchaText').innerText = `Seguridad: ${a} + ${b} =`;
}

window.submitCard = async () => {
    const txt = document.getElementById('cardText').value.trim();
    const ans = parseInt(document.getElementById('captchaInput').value);
    if(txt.length < 5 || ans !== captchaValue) return alert("Revisá el texto o la suma.");
    
    await addDoc(collection(db, 'cuerpos_cards'), {
        lvl: currentLevel,
        text: txt,
        likes: 0,
        createdAt: serverTimestamp()
    });
    alert("¡Aportado!");
    document.getElementById('cardText').value = "";
    genCaptcha();
};

// Iniciar
initMazo().then(loadData);
</script>

<style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
