<!DOCTYPE html>
<html>
<head>
    <title>Inyector Extremo</title>
    <style>
        body { background: #080810; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        button { padding: 20px; background: #ef4444; border: none; font-weight: bold; cursor: pointer; border-radius: 10px; color: white; font-size: 1.2rem; }
        #status { margin-top: 20px; color: #fbbf24; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Cargador Modo Extremo 🔥</h1>
    <p>Este script cargará 200 cartas de alto voltaje al modo Extremo.</p>
    <button id="btnCargar">CARGAR 200 CARTAS EXTREMAS</button>
    <div id="status"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDTtD4dXW1r1RWLDSOWUGIiqskAavP1Zz0",
    authDomain: "verdad-952a0.firebaseapp.com",
    projectId: "verdad-952a0",
    storageBucket: "verdad-952a0.firebasestorage.app",
    messagingSenderId: "648263922519",
    appId: "1:648263922519:web:3e3f04d3bf0b2ad13f4412"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const extremas = [
    { t: "V", x: "¿Cuál es tu fantasía más oscura que nunca le contaste a nadie?" },
    { t: "V", x: "¿Alguna vez tuviste una aventura con alguien de este grupo o un conocido mutuo?" },
    { t: "V", x: "¿Qué es lo más atrevido que hiciste en un lugar público?" },
    { t: "V", x: "¿Alguna vez enviaste fotos comprometidas a la persona equivocada? ¿Qué pasó?" },
    { t: "V", x: "¿Cuál es el lugar más extraño donde tuviste relaciones?" },
    { t: "V", x: "¿Alguna vez fuiste infiel o ayudaste a alguien a serlo?" },
    { t: "V", x: "¿Qué buscarías en el historial de navegación de la persona que tenés a la derecha?" },
    { t: "V", x: "¿Cuál fue tu experiencia sexual más vergonzosa?" },
    { t: "R", x: "Quitale una prenda de ropa a la persona de tu elección usando solo los dientes." },
    { t: "R", x: "Susurrale algo erótico al oído a la persona que más te atraiga de acá." },
    { t: "R", x: "Dejá que alguien te escriba algo con un marcador en una parte del cuerpo que no sea la cara ni manos." },
    { t: "R", x: "Hacé un baile sensual de 30 segundos frente a alguien del grupo." },
    { t: "R", x: "Mandá un mensaje de texto sugerente a alguien de tus contactos y no des explicaciones por 5 minutos." },
    { t: "R", x: "Dejá que alguien del grupo revise tus 'Mensajes Archivados' de WhatsApp." },
    { t: "R", x: "Dale un beso en el cuello a la persona que tengas a tu izquierda." },
    { t: "R", x: "Simulá un orgasmo de 10 segundos con sonido frente a todos." }
];

function generarVariedad() {
    let mazoFinal = [];
    for(let i=0; i < 200; i++) {
        let base = extremas[i % extremas.length];
        mazoFinal.push({
            mode: "extremo",
            type: base.t === "V" ? "truth" : "dare",
            text: base.x + (i > extremas.length ? " #" + i : ""),
            likes: 0,
            dislikes: 0
        });
    }
    return mazoFinal;
}

document.getElementById('btnCargar').onclick = async () => {
    const btn = document.getElementById('btnCargar');
    const status = document.getElementById('status');
    btn.disabled = true;
    
    const mazo = generarVariedad();
    for (let i = 0; i < mazo.length; i++) {
        await addDoc(collection(db, 'cards'), {
            ...mazo[i],
            createdAt: serverTimestamp()
        });
        status.innerText = `Cargando cartas extremas: ${i + 1} / 200`;
    }
    status.innerText = "¡CARGA EXTREMA FINALIZADA!";
};
</script>
</body>
</html>
