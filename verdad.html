<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VERDAD O RETO - RANKING</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050505; --surface:#111; --accent:#facc15; --red:#ff4444; --text:#fff; --muted:#666; --border:#222;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px;}
  
  .container{ width:100%; max-width:500px; text-align:center; flex-grow:1; display:flex; flex-direction:column; justify-content:center;}
  
  .card{
    background:var(--surface); border:1px solid var(--border); padding:40px 20px; border-radius:30px;
    min-height:300px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    position:relative; margin-bottom:30px;
  }

  #contentDisplay{ font-size:24px; font-weight:700; line-height:1.3; margin-bottom:20px; text-wrap:balance;}
  .type-label{ font-family:'Bebas Neue'; font-size:18px; letter-spacing:2px; color:var(--accent); margin-bottom:10px;}

  /* VOTACIÓN OPCIONAL */
  .vote-row { display: flex; gap: 20px; margin-top: 10px; }
  .btn-vote { 
    background: #000; border: 1px solid var(--border); border-radius: 15px; 
    padding: 10px 20px; font-size: 20px; cursor: pointer; transition: 0.2s;
  }
  .btn-vote.up { color: #00ff88; }
  .btn-vote.down { color: var(--red); }
  .btn-vote:active { transform: scale(1.1); background: #222; }
  .btn-vote.voted { opacity: 0.2; pointer-events: none; }

  .btn-grid{ display:grid; grid-template-columns: 1fr 1fr; gap:15px; width:100%;}
  .btn-action{ 
    padding:20px; border:none; border-radius:20px; font-family:'Bebas Neue'; 
    font-size:22px; cursor:pointer; transition:0.2s;
  }
  .btn-verdad{ background:var(--accent); color:#000; }
  .btn-reto{ background:#fff; color:#000; }
  .btn-action:active{ transform:scale(0.95); }

  .add-box{ background:var(--surface); padding:20px; border-radius:25px; border:1px solid var(--border); margin-top:30px; width:100%; }
  .add-box.locked{ opacity:0.1; pointer-events:none; }
  input, select{ width:100%; background:#000; border:1px solid var(--border); color:#fff; padding:12px; border-radius:12px; margin-top:10px;}
  
  .btn-back{ position:absolute; top:20px; left:20px; background:none; border:none; color:var(--muted); font-family:'Bebas Neue'; font-size:16px;}
</style>
</head>
<body>

<button class="btn-back" onclick="location.href='index.html'">← VOLVER</button>

<div class="container">
  <div class="card">
    <div id="typeLabel" class="type-label">¿LISTOS?</div>
    <div id="contentDisplay">Elegí una opción para empezar a jugar</div>
    
    <div class="vote-row" id="voteControls" style="display:none;">
      <button class="btn-vote down" onclick="vote(false)">👎</button>
      <button class="btn-vote up" onclick="vote(true)">👍</button>
    </div>
  </div>

  <div class="btn-grid">
    <button class="btn-action btn-verdad" onclick="getNext('verdad')">VERDAD</button>
    <button class="btn-action btn-reto" onclick="getNext('reto')">RETO</button>
  </div>

  <div class="add-box locked" id="addBox">
    <p id="progText" style="font-size:11px; color:var(--muted);">5 JUEGOS PARA COLABORAR (0/5)</p>
    <select id="newType">
        <option value="verdad">Es una Verdad</option>
        <option value="reto">Es un Reto</option>
    </select>
    <input type="text" id="newText" placeholder="Escribí acá tu frase...">
    <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin:10px 0;">
      <span id="captchaQ" style="font-size:12px;"></span>
      <input type="number" id="captchaA" style="width:70px; margin-top:0;">
    </div>
    <button onclick="addNew()" style="width:100%; padding:10px; background:var(--accent); border:none; border-radius:10px; font-family:'Bebas Neue'; font-size:18px; cursor:pointer;">ENVIAR</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDTtD4dXW1r1RWLDSOWUGIiqskAavP1Zz0",
    authDomain: "verdad-952a0.firebaseapp.com",
    projectId: "verdad-952a0",
    storageBucket: "verdad-952a0.firebasestorage.app",
    messagingSenderId: "648263922519",
    appId: "1:648263922519:web:3e3f04d3bf0b2ad13f4412"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let allContent = [];
  let currentId = null;
  let correctSum = 0;
  let plays = parseInt(localStorage.getItem('plays_verdad')) || 0;

  onSnapshot(collection(db, 'items'), (snap) => {
    allContent = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateProgress();
  });

  function genCaptcha() {
    const a = Math.floor(Math.random()*9)+1, b = Math.floor(Math.random()*9)+1;
    correctSum = a + b;
    document.getElementById('captchaQ').innerText = `${a} + ${b} =`;
  }
  genCaptcha();

  window.getNext = (type) => {
    const filtered = allContent.filter(i => i.type === type);
    if(filtered.length === 0) return;

    // ALGORITMO DE PESOS (±25% de probabilidad)
    let pool = [];
    filtered.forEach(item => {
        const likes = item.likes || 0;
        const dislikes = item.dislikes || 0;
        const total = likes + dislikes;
        const ratio = total === 0 ? 0.5 : likes / total;

        let tickets = 100;
        if (ratio >= 0.6) tickets = 125; // +25% chance
        else if (ratio <= 0.4 && total > 2) tickets = 75; // -25% chance

        for(let i=0; i < tickets; i++) pool.push(item);
    });

    const selected = pool[Math.floor(Math.random() * pool.length)];
    currentId = selected.id;
    
    document.getElementById('typeLabel').innerText = type.toUpperCase();
    document.getElementById('contentDisplay').innerText = selected.text;
    document.getElementById('voteControls').style.display = 'flex';
    document.getElementById('voteControls').classList.remove('voted');

    plays++;
    localStorage.setItem('plays_verdad', plays);
    updateProgress();
  };

  window.vote = async (isLike) => {
    if(!currentId) return;
    document.getElementById('voteControls').classList.add('voted');
    await updateDoc(doc(db, 'items', currentId), {
        [isLike ? 'likes' : 'dislikes']: increment(1)
    });
  };

  function updateProgress() {
    const box = document.getElementById('addBox');
    const txt = document.getElementById('progText');
    if(plays >= 5) { box.classList.remove('locked'); txt.innerText = "✅ YA PODÉS AGREGAR"; }
    else { txt.innerText = `JUGÁ ${5 - plays} VECES MÁS PARA AGREGAR`; }
  }

  window.addNew = async () => {
    const text = document.getElementById('newText').value.trim();
    const type = document.getElementById('newType').value;
    const ans = parseInt(document.getElementById('captchaA').value);
    
    if(text.length < 5 || ans !== correctSum) return alert("Datos inválidos.");

    await addDoc(collection(db, 'items'), {
        text: text,
        type: type,
        likes: 0,
        dislikes: 0,
        createdAt: serverTimestamp()
    });
    alert("¡Enviado!");
    document.getElementById('newText').value = "";
    genCaptcha();
  };
</script>
</body>
</html>
