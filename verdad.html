<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VERDAD O RETO - FINAL</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080810; --surface:#10101c; --border:#1f1f38;
    --truth:#ff5733; --dare:#8b5cf6; --accent:#fbbf24; --green:#10b981;
    --text:#f0eff6; --muted:#64638a;
    --normal:#10b981; --picante:#f97316; --extremo:#ef4444;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
  .wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:0 12px 20px;}
  .screen{display:none;} .screen.active{display:block;}
  
  header{text-align:center;padding:40px 0 16px; position: relative;}
  .back-to-index{position:absolute; top:15px; left:0; background:none; border:none; color:var(--muted); cursor:pointer; font-family:'Bebas Neue'; font-size:18px; display:flex; align-items:center; gap:5px;}
  
  .logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,12vw,100px);line-height:0.88;letter-spacing:3px;background:linear-gradient(135deg,var(--truth) 0%,var(--accent) 50%,var(--dare) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  
  .mode-cards{display:flex;flex-direction:column;gap:14px; margin-top: 20px;}
  .mode-card{padding:24px;border-radius:20px;border:2px solid transparent;cursor:pointer;background:var(--surface);display:flex;align-items:center;gap:20px;}
  .mode-normal{border-color:rgba(16,185,129,0.3);}
  .mode-picante{border-color:rgba(249,115,22,0.3);}
  .mode-extremo{border-color:rgba(239,68,68,0.3);}
  .mode-name{font-family:'Bebas Neue', sans-serif; font-size:28px; letter-spacing:2px; line-height:1;}
  .mode-normal .mode-name{color:var(--normal);} .mode-picante .mode-name{color:var(--picante);} .mode-extremo .mode-name{color:var(--extremo);}
  .mode-desc{font-size:13px; color:var(--muted); margin-top:4px;}
  .mode-count{font-family:'Bebas Neue', sans-serif; font-size:22px; color:var(--muted); margin-left:auto;}

  .game-topbar{display:flex;align-items:center;gap:10px;margin: 15px 0;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;}
  .back-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Bebas Neue';font-size:18px;}
  .current-mode-badge{font-family:'Bebas Neue';font-size:12px;letter-spacing:2px;padding:3px 10px;border-radius:99px;margin-left:auto;}
  .badge-normal{background:rgba(16,185,129,0.15);color:var(--normal);}
  .badge-picante{background:rgba(249,115,22,0.15);color:var(--picante);}
  .badge-extremo{background:rgba(239,68,68,0.15);color:var(--extremo);}

  .choice-section{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:15px;}
  .choice-btn{padding:16px;border:2px solid transparent;border-radius:15px;cursor:pointer;font-family:'Bebas Neue';font-size:28px;background:var(--surface);}
  .btn-truth{border-color:var(--truth);color:var(--truth);}
  .btn-dare{border-color:var(--dare);color:var(--dare);}

  .card{width:100%;padding:24px;border-radius:16px;border:1px solid var(--border);background:var(--surface);min-height:150px;display:flex;flex-direction:column;justify-content:center;margin-bottom:15px; text-align: center;}
  .truth-card{border-left:5px solid var(--truth);} .dare-card{border-left:5px solid var(--dare);}
  .card-text{font-size:20px; font-weight:700;}

  .vote-box { display: flex; gap: 10px; margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; }
  .vote-btn { border: none; padding: 12px; border-radius: 10px; cursor: pointer; flex: 1; font-family: 'Bebas Neue'; font-size: 14px; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-down { background: #ef4444; } 
  .btn-up { background: #10b981; }   
  
  #loadingOverlay{ position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
  .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .add-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px; margin-top: 20px;}
  .add-section.locked{opacity:0.2; pointer-events: none;}
  textarea{width:100%;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:10px;color:#fff;margin:10px 0;height:70px; font-family: inherit;}
  .captcha-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 14px; }
  #captchaInput { width: 60px; padding: 8px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 5px; }
  .submit-btn{width:100%;padding:12px;border:none;border-radius:10px;background:var(--accent);color:black;font-family:'Bebas Neue';font-size:20px;cursor:pointer;}
</style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <p style="margin-top:15px; font-family:'Bebas Neue'; letter-spacing:2px;">CARGANDO MAZO...</p>
</div>

<div class="wrap">
  <div class="screen active" id="screenMode">
    <header>
      <button class="back-to-index" onclick="location.href='index.html'">← VOLVER</button>
      <div class="logo">VERDAD<br>O RETO</div>
      <p class="tagline">Comunidad 🎲</p>
    </header>
    <div class="mode-cards">
      <div class="mode-card mode-normal" onclick="enterMode('normal')">
        <div style="font-size:32px;">😄</div>
        <div><div class="mode-name">NORMAL</div><div class="mode-desc">Para toda la joda.</div></div>
        <div class="mode-count" id="countNormal">0</div>
      </div>
      <div class="mode-card mode-picante" onclick="enterMode('picante')">
        <div style="font-size:32px;">🌶️</div>
        <div><div class="mode-name">PICANTE</div><div class="mode-desc">Sube el tono.</div></div>
        <div class="mode-count" id="countPicante">0</div>
      </div>
      <div class="mode-card mode-extremo" onclick="enterMode('extremo')">
        <div style="font-size:32px;">💀</div>
        <div><div class="mode-name">EXTREMO</div><div class="mode-desc">Sin filtros.</div></div>
        <div class="mode-count" id="countExtremo">0</div>
      </div>
    </div>
  </div>

  <div class="screen" id="screenGame">
    <div class="game-topbar">
      <button class="back-btn" onclick="goBack()">← ATRÁS</button>
      <span class="current-mode-badge" id="modeBadge">NORMAL</span>
    </div>

    <div class="choice-section">
      <button class="choice-btn btn-truth" onclick="drawCard('truth')">VERDAD</button>
      <button class="choice-btn btn-dare" onclick="drawCard('dare')">RETO</button>
    </div>

    <div id="cardWrap"><div class="card" style="color:var(--muted)">Elegí una opción</div></div>

    <div class="add-section locked" id="addSection">
      <p id="progText" style="font-size:11px; margin-bottom:10px; font-family:'Bebas Neue'; letter-spacing:1px;">JUGÁ PARA COLABORAR</p>
      <textarea id="cardText" placeholder="Escribí aquí tu aporte..."></textarea>
      <div class="captcha-row">
          <span id="captchaText"></span>
          <input type="number" id="captchaInput">
      </div>
      <button class="submit-btn" onclick="submitCard()">SUBIR AL MAZO</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDTtD4dXW1r1RWLDSOWUGIiqskAavP1Zz0",
    authDomain: "verdad-952a0.firebaseapp.com",
    projectId: "verdad-952a0",
    storageBucket: "verdad-952a0.firebasestorage.app",
    messagingSenderId: "648263922519",
    appId: "1:648263922519:web:3e3f04d3bf0b2ad13f4412"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allCards = [];
let currentMode = 'normal';
let myPlays = parseInt(localStorage.getItem('vr-plays') || '0');
let currentCardId = null;
let captchaValue = 0;

onSnapshot(query(collection(db, 'cards'), orderBy('createdAt', 'desc')), (snap) => {
    allCards = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    updateCounts();
    updateProgressUI();
});

function genCaptcha() {
    const a = Math.floor(Math.random()*9)+1, b = Math.floor(Math.random()*9)+1;
    captchaValue = a + b;
    document.getElementById('captchaText').innerText = `¿Cuánto es ${a} + ${b}?`;
}

function updateCounts() {
    ['normal', 'picante', 'extremo'].forEach(m => {
        const count = allCards.filter(c => c.mode === m).length;
        const el = document.getElementById('count' + m.charAt(0).toUpperCase() + m.slice(1));
        if(el) el.innerText = count;
    });
}

window.enterMode = (mode) => {
    const loader = document.getElementById('loadingOverlay');
    loader.style.display = 'flex';
    setTimeout(() => {
        currentMode = mode;
        document.getElementById('modeBadge').innerText = mode.toUpperCase();
        document.getElementById('modeBadge').className = `current-mode-badge badge-${mode}`;
        document.getElementById('screenMode').classList.remove('active');
        document.getElementById('screenGame').classList.add('active');
        loader.style.display = 'none';
        genCaptcha();
    }, 2000); // Reducido a 2s para mejor fluidez
};

window.goBack = () => {
    document.getElementById('screenGame').classList.remove('active');
    document.getElementById('screenMode').classList.add('active');
};

window.drawCard = (type) => {
    const filtered = allCards.filter(c => c.mode === currentMode && c.type === type);
    if (filtered.length === 0) return alert("Sin cartas cargadas.");

    let pool = [];
    filtered.forEach(card => {
        const likes = card.likes || 0;
        const dislikes = card.dislikes || 0;
        const total = likes + dislikes;
        const ratio = total === 0 ? 0.5 : likes / total;
        let tickets = 100;
        if (ratio >= 0.6) tickets = 125;
        else if (ratio <= 0.4 && total > 2) tickets = 75;
        for(let i=0; i<tickets; i++) pool.push(card);
    });

    const card = pool[Math.floor(Math.random() * pool.length)];
    currentCardId = card.id;

    document.getElementById('cardWrap').innerHTML = `
        <div class="card ${card.type}-card">
            <div class="card-text">${card.text}</div>
            <div class="vote-box" id="vbox">
                <button class="vote-btn btn-down" onclick="vote(false)">👎 NO ME GUSTA</button>
                <button class="vote-btn btn-up" onclick="vote(true)">👍 ME GUSTA</button>
            </div>
        </div>
    `;

    myPlays++;
    localStorage.setItem('vr-plays', myPlays);
    updateProgressUI();
};

window.vote = async (isLike) => {
    if(!currentCardId) return;
    const box = document.getElementById('vbox');
    box.style.opacity = "0.3";
    box.style.pointerEvents = "none";
    try {
        await updateDoc(doc(db, 'cards', currentCardId), { 
            [isLike ? 'likes' : 'dislikes']: increment(1),
            lastUpdate: serverTimestamp() // NECESARIO PARA LAS REGLAS DE 3s
        });
        box.innerHTML = `<span style="color:var(--green); font-family:'Bebas Neue'; font-size:14px; width:100%; text-align:center;">VOTO REGISTRADO</span>`;
    } catch (e) {
        box.style.opacity = "1";
        box.style.pointerEvents = "auto";
        alert("Esperá un momento para votar de nuevo.");
    }
};

function updateProgressUI() {
    const box = document.getElementById('addSection');
    const txt = document.getElementById('progText');
    if (myPlays >= 10) {
        box.classList.remove('locked');
        txt.innerText = "✅ YA PODÉS COLABORAR";
    } else {
        txt.innerText = `JUGÁ ${10 - myPlays} VECES PARA AGREGAR`;
    }
}

window.submitCard = async () => {
    const text = document.getElementById('cardText').value.trim();
    const ans = parseInt(document.getElementById('captchaInput').value);
    if (text.length < 5) return alert("Muy corto.");
    if (ans !== captchaValue) return alert("Suma incorrecta.");
    
    try {
        await addDoc(collection(db, 'cards'), {
            type: Math.random() > 0.5 ? 'truth' : 'dare',
            mode: currentMode,
            text: text,
            likes: 0, dislikes: 0,
            createdAt: serverTimestamp(),
            lastUpdate: serverTimestamp() // NECESARIO PARA LAS REGLAS DE 3s
        });
        document.getElementById('cardText').value = "";
        document.getElementById('captchaInput').value = "";
        alert("¡Enviada!");
        genCaptcha();
    } catch (e) {
        alert("Esperá unos segundos antes de enviar otra.");
    }
};
</script>
</body>
</html>
