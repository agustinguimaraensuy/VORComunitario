
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>¿QUIÉN SOY? - FIX</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050505; --accent:#00ff88; --text:#ffffff; --muted:#444; --border:#222;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  
  @media screen and (orientation: portrait) {
    #rotate-warning { display: flex !important; }
  }

  body{
    background:var(--bg); color:var(--text); 
    font-family:'DM Sans',sans-serif; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    text-align:center; overflow:hidden;
  }

  #rotate-warning {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:var(--bg); z-index:10000; display:none;
    flex-direction:column; align-items:center; justify-content:center;
  }

  .screen{ display:none; width:100%; height:100vh; padding:20px; flex-direction:column; align-items:center; justify-content:center; position:relative;}
  .active{ display:flex; }

  /* FIX NOMBRES LARGOS */
  #nameDisplay{ 
    font-family:'Bebas Neue'; 
    font-size: clamp(40px, 12vw, 90px); /* Tamaño más controlado */
    text-transform: uppercase; 
    line-height: 1;
    color: var(--accent);
    margin: 10px 0;
    max-width: 90vw;
    word-wrap: break-word;
    text-wrap: balance; /* Distribuye el texto en dos líneas si es largo */
  }

  .timer-box {
    font-family: 'Bebas Neue';
    font-size: 30px;
    color: var(--text);
    background: #111;
    padding: 5px 15px;
    border-radius: 10px;
    margin-bottom: 10px;
  }

  /* FIX FORMULARIO - Solo en menú para que no tape el juego */
  .add-box{ 
    background:#111; width:95%; max-width:650px; padding:12px; 
    border-radius:15px; border:1px solid var(--border); 
    display:flex; flex-direction:row; gap:10px; align-items:center;
    margin-top: 15px;
  }
  .add-box.locked{ opacity:0.1; pointer-events:none; }
  
  .btn-main{ background:var(--accent); color:#000; border:none; padding:12px 25px; font-family:'Bebas Neue'; font-size:22px; border-radius:10px; cursor:pointer; z-index: 100;}
  .btn-back{ position:absolute; top:10px; left:10px; background:none; border:none; color:var(--muted); font-family:'Bebas Neue'; font-size:14px; z-index: 500;}
  
  input{ background:#000; border:1px solid var(--border); color:#fff; padding:6px; border-radius:5px; font-size: 14px;}
</style>
</head>
<body>

  <div id="rotate-warning">
    <div style="font-size: 40px;">🔄</div>
    <p style="font-family:'Bebas Neue'; font-size:20px;">MODO HORIZONTAL</p>
  </div>

  <button class="btn-back" onclick="location.href='index.html'">← SALIR</button>

  <div class="screen active" id="menu">
    <div style="font-family:'Bebas Neue'; font-size:40px; color:var(--accent); margin-bottom:10px;">¿QUIÉN SOY?</div>
    <button class="btn-main" onclick="startTimer()">¡EMPEZAR JUEGO!</button>

    <div class="add-box locked" id="addBox">
      <div style="flex:2">
        <p id="progText" style="font-size:9px; color:var(--muted); margin-bottom:3px;">5 JUEGOS PARA AGREGAR (0/5)</p>
        <input type="text" id="newName" placeholder="Nombre del famoso..." style="width:100%">
      </div>
      <div style="flex:1">
        <p id="captchaQ" style="font-size:10px; margin-bottom:3px;"></p>
        <input type="number" id="captchaA" style="width:100%">
      </div>
      <button onclick="addNewCharacter()" style="background:var(--accent); border:none; padding:10px; border-radius:5px; font-family:'Bebas Neue'; cursor:pointer; flex:0.5">OK</button>
    </div>
  </div>

  <div class="screen" id="timerScreen">
    <div style="font-family:'Bebas Neue'; font-size:80px; color:var(--accent);" id="countdown">5</div>
    <p style="letter-spacing:3px; color:var(--muted)">¡A LA FRENTE!</p>
  </div>

  <div class="screen" id="gameScreen">
    <div class="timer-box" id="gameTimer">03:00</div>
    <div id="nameDisplay">---</div>
    <div style="margin-top: 15px;">
        <button class="btn-main" onclick="location.reload()">TERMINAR / SIGUIENTE</button>
    </div>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDTtD4dXW1r1RWLDSOWUGIiqskAavP1Zz0",
    authDomain: "verdad-952a0.firebaseapp.com",
    projectId: "verdad-952a0",
    storageBucket: "verdad-952a0.firebasestorage.app",
    messagingSenderId: "648263922519",
    appId: "1:648263922519:web:3e3f04d3bf0b2ad13f4412"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let cloudNames = [];
  let correctSum = 0;

  // Persistencia simple de jugadas para desbloquear el form
  let plays = parseInt(localStorage.getItem('plays_quien')) || 0;

  onSnapshot(collection(db, 'who_am_i'), (snap) => {
    cloudNames = snap.docs.map(doc => doc.data().name);
    updateProgress();
  });

  function genCaptcha() {
    const a = Math.floor(Math.random()*9)+1;
    const b = Math.floor(Math.random()*9)+1;
    correctSum = a + b;
    document.getElementById('captchaQ').innerText = `${a} + ${b} =`;
  }
  genCaptcha();

  window.startTimer = () => {
    document.getElementById('menu').classList.remove('active');
    document.getElementById('timerScreen').classList.add('active');
    let time = 5;
    const t = setInterval(() => {
      time--;
      document.getElementById('countdown').innerText = time;
      if(time <= 0) { clearInterval(t); runGame(); }
    }, 1000);
  };

  function runGame() {
    const pool = cloudNames.length > 0 ? cloudNames : ["Lionel Messi", "Ricardo Fort"];
    document.getElementById('nameDisplay').innerText = pool[Math.floor(Math.random()*pool.length)];
    
    document.getElementById('timerScreen').classList.remove('active');
    document.getElementById('gameScreen').classList.add('active');

    let secondsLeft = 180; 
    const gameInt = setInterval(() => {
      secondsLeft--;
      let m = Math.floor(secondsLeft / 60);
      let s = secondsLeft % 60;
      document.getElementById('gameTimer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
      if(secondsLeft <= 0) {
        clearInterval(gameInt);
        document.getElementById('nameDisplay').innerText = "¡TIEMPO!";
      }
    }, 1000);

    // Guardar progreso
    plays++;
    localStorage.setItem('plays_quien', plays);
  }

  function updateProgress() {
    const box = document.getElementById('addBox');
    const txt = document.getElementById('progText');
    if(plays >= 5) {
      box.classList.remove('locked');
      txt.innerText = "✅ PODÉS COLABORAR";
      txt.style.color = "var(--accent)";
    } else {
      txt.innerText = `5 JUEGOS PARA AGREGAR (${plays}/5)`;
    }
  }

  window.addNewCharacter = async () => {
    const val = document.getElementById('newName').value.trim();
    const ans = parseInt(document.getElementById('captchaA').value);
    if(val.length < 2 || ans !== correctSum) return alert("Revisá los datos.");

    await addDoc(collection(db, 'who_am_i'), { name: val, createdAt: serverTimestamp() });
    alert("¡Personaje enviado!");
    document.getElementById('newName').value = "";
    genCaptcha();
  };
</script>
</body>
</html>
