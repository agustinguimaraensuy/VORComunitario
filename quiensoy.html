!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, orientation=landscape">
<title>¿QUIÉN SOY? - HORIZONTAL</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050505; --accent:#00ff88; --text:#ffffff; --muted:#444; --border:#222;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  
  /* Forzar modo horizontal visualmente */
  @media screen and (orientation: portrait) {
    #rotate-warning { display: flex !important; }
  }

  body{
    background:var(--bg); color:var(--text); 
    font-family:'DM Sans',sans-serif; min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    text-align:center; overflow:hidden;
  }

  #rotate-warning {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:var(--bg); z-index:9999; display:none;
    flex-direction:column; align-items:center; justify-content:center;
  }

  .screen{ display:none; width:100%; height:100vh; padding:10px; flex-direction:column; align-items:center; justify-content:center;}
  .active{ display:flex; }

  /* Pantalla de Juego */
  #nameDisplay{ 
    font-family:'Bebas Neue'; 
    font-size: 18vw; /* Letras gigantes en horizontal */
    text-transform: uppercase; 
    line-height: 0.9;
    color: var(--accent);
    margin: 10px 0;
  }

  .timer-box {
    font-family: 'Bebas Neue';
    font-size: 40px;
    color: var(--text);
    background: #111;
    padding: 5px 20px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  /* Formulario (achicado para que entre en horizontal) */
  .add-box{ 
    background:#111; width:95%; max-width:600px; padding:15px; 
    border-radius:15px; border:1px solid var(--border); 
    display:flex; flex-direction:row; gap:10px; align-items:center;
  }
  .add-box.locked{ opacity:0.1; pointer-events:none; }
  
  .btn-main{ background:var(--accent); color:#000; border:none; padding:15px 30px; font-family:'Bebas Neue'; font-size:24px; border-radius:10px; cursor:pointer;}
  .btn-back{ position:absolute; top:15px; left:15px; background:none; border:none; color:var(--muted); font-family:'Bebas Neue'; font-size:16px;}
  
  input{ background:#000; border:1px solid var(--border); color:#fff; padding:8px; border-radius:5px;}
</style>
</head>
<body>

  <div id="rotate-warning">
    <div style="font-size: 50px;">🔄</div>
    <p style="font-family:'Bebas Neue'; font-size:24px;">GIRÁ EL CELULAR</p>
    <p style="color:var(--muted)">Para jugar debés estar en horizontal</p>
  </div>

  <button class="btn-back" onclick="location.href='index.html'">← SALIR</button>

  <div class="screen active" id="menu">
    <div style="font-family:'Bebas Neue'; font-size:50px; color:var(--accent);">¿QUIÉN SOY?</div>
    <button class="btn-main" onclick="startTimer()">¡JUGAR!</button>

    <div class="add-box locked" id="addBox" style="margin-top:20px;">
      <div style="flex:1">
        <p id="progText" style="font-size:9px; color:var(--muted); margin-bottom:5px;">5 JUEGOS PARA AGREGAR (0/5)</p>
        <input type="text" id="newName" placeholder="Nombre..." style="width:100%">
      </div>
      <div>
        <p id="captchaQ" style="font-size:10px;"></p>
        <input type="number" id="captchaA" style="width:60px">
      </div>
      <button onclick="addNewCharacter()" style="background:var(--accent); border:none; padding:10px; border-radius:5px; font-family:'Bebas Neue'; cursor:pointer;">SUBIR</button>
    </div>
  </div>

  <div class="screen" id="timerScreen">
    <div style="font-family:'Bebas Neue'; font-size:100px; color:var(--accent);" id="countdown">5</div>
    <p style="letter-spacing:5px; color:var(--muted)">PONELO EN TU FRENTE</p>
  </div>

  <div class="screen" id="gameScreen">
    <div class="timer-box" id="gameTimer">03:00</div>
    <div id="nameDisplay">---</div>
    <button class="btn-main" style="padding:10px 20px; font-size:18px;" onclick="location.reload()">TERMINAR / SIGUIENTE</button>
  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDTtD4dXW1r1RWLDSOWUGIiqskAavP1Zz0",
    authDomain: "verdad-952a0.firebaseapp.com",
    projectId: "verdad-952a0",
    storageBucket: "verdad-952a0.firebasestorage.app",
    messagingSenderId: "648263922519",
    appId: "1:648263922519:web:3e3f04d3bf0b2ad13f4412"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  let cloudNames = [];
  let plays = 0;
  let correctSum = 0;

  onSnapshot(collection(db, 'who_am_i'), (snap) => {
    cloudNames = snap.docs.map(doc => doc.data().name);
  });

  function genCaptcha() {
    const a = Math.floor(Math.random()*9)+1;
    const b = Math.floor(Math.random()*9)+1;
    correctSum = a + b;
    document.getElementById('captchaQ').innerText = `${a} + ${b} =`;
  }
  genCaptcha();

  window.startTimer = () => {
    document.getElementById('menu').classList.remove('active');
    document.getElementById('timerScreen').classList.add('active');
    let time = 5;
    const t = setInterval(() => {
      time--;
      document.getElementById('countdown').innerText = time;
      if(time <= 0) { clearInterval(t); runGame(); }
    }, 1000);
  };

  function runGame() {
    const pool = cloudNames.length > 0 ? cloudNames : ["Messi", "Goku", "Batman"];
    document.getElementById('nameDisplay').innerText = pool[Math.floor(Math.random()*pool.length)];
    
    document.getElementById('timerScreen').classList.remove('active');
    document.getElementById('gameScreen').classList.add('active');

    // Cronómetro de 3 minutos (atrás)
    let secondsLeft = 180; 
    const gameInt = setInterval(() => {
      secondsLeft--;
      let m = Math.floor(secondsLeft / 60);
      let s = secondsLeft % 60;
      document.getElementById('gameTimer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
      
      if(secondsLeft <= 0) {
        clearInterval(gameInt);
        document.getElementById('nameDisplay').innerText = "¡TIEMPO AGOTADO!";
      }
    }, 1000);

    // Lógica de progreso (5 juegos)
    plays++;
    updateProgress();
  }

  function updateProgress() {
    const box = document.getElementById('addBox');
    const txt = document.getElementById('progText');
    if(plays >= 5) {
      box.classList.remove('locked');
      txt.innerText = "✅ PODÉS AGREGAR";
      txt.style.color = "var(--accent)";
    } else {
      txt.innerText = `5 JUEGOS PARA AGREGAR (${plays}/5)`;
    }
  }

  window.addNewCharacter = async () => {
    const val = document.getElementById('newName').value.trim();
    const ans = parseInt(document.getElementById('captchaA').value);
    if(val.length < 2 || ans !== correctSum) return alert("Datos incorrectos");

    await addDoc(collection(db, 'who_am_i'), { name: val, createdAt: serverTimestamp() });
    alert("¡Agregado!");
    location.reload();
  };
</script>
</body>
</html>
