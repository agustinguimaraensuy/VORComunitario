
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PARTY HUB - JUEGOS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050505; --surface:#111111; --border:#222;
    --accent:#facc15; --game3:#00ff88; --text:#ffffff; --muted:#666;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center;}
  
  .container{ width:100%; max-width:500px; padding:40px 20px; text-align:center;}
  
  header{ margin-bottom:40px;}
  .logo{ font-family:'Bebas Neue'; font-size:60px; line-height:0.9; color:var(--text); letter-spacing:2px;}
  .logo span{ color:var(--accent); }
  .tagline{ font-size:10px; letter-spacing:4px; color:var(--muted); margin-top:10px; text-transform:uppercase;}

  .menu-grid{ display:grid; gap:15px; width:100%;}
  
  .game-card{
    background:var(--surface);
    border:1px solid var(--border);
    padding:25px 20px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    transition: all 0.2s ease;
  }
  
  .game-card:active{ transform:scale(0.96); background: #1a1a1a; }
  
  /* Colores por juego */
  .card-verdad{ border-left: 5px solid var(--accent); }
  .card-shots{ border-left: 5px solid #ef4444; }
  .card-quien{ border-left: 5px solid var(--game3); }

  .icon{ font-size:32px; margin-bottom:10px;}
  .title{ font-family:'Bebas Neue'; font-size:28px; letter-spacing:2px; margin-bottom:5px;}
  .desc{ font-size:12px; color:var(--muted); line-height:1.2;}

  .btn-debug{
    margin-top:30px;
    padding:12px;
    background:transparent;
    border:1px dashed #333;
    border-radius:10px;
    color:#333;
    text-decoration:none;
    font-size:11px;
    font-family:'Bebas Neue';
    letter-spacing:2px;
  }

  .footer{ margin-top:auto; padding:30px; font-size:9px; color:#222; letter-spacing:1px;}
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">PARTY<span>HUB</span></div>
    <p class="tagline">Salto - Uruguay 2026</p>
  </header>

  <div class="menu-grid">
    
    <a href="verdad.html" class="game-card card-verdad">
      <div class="icon">🎲</div>
      <div class="title">VERDAD O RETO</div>
      <div class="desc">Para sacar los trapitos al sol.</div>
    </a>

    <a href="shots.html" class="game-card card-shots">
      <div class="icon">🥃</div>
      <div class="title">SHOT MASTER</div>
      <div class="desc">El que pierde, toma. Sin vueltas.</div>
    </a>

    <a href="quiensoy.html" class="game-card card-quien">
      <div class="icon">👤</div>
      <div class="title">¿QUIÉN SOY?</div>
      <div class="desc">Ponete el cel en la frente y adiviná.</div>
    </a>

    <a href="prueba.html" class="btn-debug">⚙️ MODO DESARROLLADOR / PRUEBAS</a>

  </div>
</div>

<footer class="footer">
  VERSION 1.2 - BY GEMINI
</footer>

</body>
</html>
